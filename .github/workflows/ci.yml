name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  backend-lint-and-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: motoya_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: motoya_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio aiosqlite

      - name: Lint with Ruff
        run: ruff check app/ tests/

      - name: Run unit tests
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+asyncpg://motoya_test:test_password@localhost:5432/motoya_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-jwt-secret-not-for-production
        run: pytest tests/test_validators.py -v

      - name: Run integration tests
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+asyncpg://motoya_test:test_password@localhost:5432/motoya_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-jwt-secret-not-for-production
        run: pytest tests/test_auth_integration.py -v

  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/ --max-warnings 0

      - name: Type check
        run: npx tsc --noEmit
